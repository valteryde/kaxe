# On each push to master, bump pyproject.toml with a .devN suffix and push back.
# Skips when the commit is already the bot's dev-version bump (avoids loops).

name: Dev version auto-push

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  bump-dev-and-push:
    if: >-
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: dev version')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump .dev version suffix
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          BASE=$(echo "$VERSION" | sed 's/\.dev[0-9]*$//')
          if echo "$VERSION" | grep -qE '\.dev[0-9]+$'; then
            DEV=$(echo "$VERSION" | sed -n 's/.*\.dev\([0-9]*\)$/\1/p')
            DEV=$((DEV + 1))
          else
            DEV=0
          fi
          NEW_VERSION="${BASE}.dev${DEV}"
          sed -i "s/^version = .*/version = \"${NEW_VERSION}\"/" pyproject.toml
          echo "Bumped $VERSION -> $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: dev version ${NEW_VERSION}"
          git push
